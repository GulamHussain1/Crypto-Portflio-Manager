<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Crypto Manager{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    
    {% block head %}{% endblock %}
</head>
<body>
    <style>body { display: block; height: 100%; }</style>

    <div class="app-layout">
        
        <aside class="sidebar">
            <div class="sidebar-brand">Crypto Manager</div>
            <ul class="nav-menu">
                <li><a href="{{ url_for('dashboard') }}" class="{% if request.endpoint == 'dashboard' %}active{% endif %}">📊 Dashboard</a></li>
                <li><a href="{{ url_for('live_market') }}" class="{% if request.endpoint == 'live_market' %}active{% endif %}">📈 Live Market</a></li>
                <li><a href="{{ url_for('investment_mix') }}" class="{% if request.endpoint == 'investment_mix' %}active{% endif %}">🧪 Investment Mix</a></li>
                <li><a href="{{ url_for('simulator') }}" class="{% if request.endpoint == 'simulator' %}active{% endif %}">🎮 Portfolio Simulator</a></li>
                <li><a href="{{ url_for('forecast') }}" class="{% if request.endpoint == 'forecast' %}active{% endif %}">🔮 Price Forecast</a></li>
                <li><a href="{{ url_for('risk_analysis') }}" class="{% if request.endpoint == 'risk_analysis' %}active{% endif %}">⚠️ Risk Analysis</a></li>
                <li><a href="{{ url_for('reports') }}" class="{% if request.endpoint == 'reports' %}active{% endif %}">📄 Reports</a></li>
                <li><a href="{{ url_for('settings') }}" class="{% if request.endpoint == 'settings' %}active{% endif %}">⚙️ Settings</a></li>
                
                <li style="margin-top: 2rem;"><a href="{{ url_for('logout') }}" style="color: #ef4444;">🚪 Logout</a></li>
            </ul>
        </aside>

        <main class="main-content">
            {% block content %}
            {% endblock %}
        </main>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
